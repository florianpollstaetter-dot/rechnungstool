name: qa-playwright

# SCH-976 — K2-γ QA suite. Runs the Playwright specs in tests/e2e/specs
# against a freshly-provisioned `qa-perms-<runid>` tenant on the configured
# Supabase project. Triggered on PRs that touch app/test code, on pushes to
# master, and manually via workflow_dispatch.
#
# Required repo secrets (Settings → Secrets → Actions):
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
# Optional:
#   PLAYWRIGHT_BASE_URL — point at a deployed env (e.g. a Vercel preview)
#                         instead of booting `npm run dev` in CI. When unset
#                         the workflow boots the local dev server.

on:
  push:
    branches: [master]
    paths:
      - "src/**"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/qa-playwright.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/e2e/**"
      - "playwright.config.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/qa-playwright.yml"
  workflow_dispatch:
    inputs:
      base_url:
        description: "Override BASE_URL (e.g. https://my-preview.vercel.app)"
        required: false
        default: ""

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      BASE_URL: ${{ inputs.base_url || secrets.PLAYWRIGHT_BASE_URL || '' }}
      CI: "true"
    steps:
      - name: Guard — Supabase secrets must be present
        run: |
          missing=()
          [ -n "$NEXT_PUBLIC_SUPABASE_URL" ] || missing+=("NEXT_PUBLIC_SUPABASE_URL")
          [ -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" ] || missing+=("NEXT_PUBLIC_SUPABASE_ANON_KEY")
          [ -n "$SUPABASE_SERVICE_ROLE_KEY" ] || missing+=("SUPABASE_SERVICE_ROLE_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing repo secrets: ${missing[*]}" >&2
            echo "Add them under Settings → Secrets → Actions." >&2
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium
      - name: Run Playwright suite
        run: npm run test:e2e
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            tests/e2e/.artifacts
            playwright-report
          retention-days: 7
