name: Supabase migrations drift check

on:
  pull_request:
    branches: [master]
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/supabase-migrations.yml'
      - '.github/workflows/supabase-migrations-drift.yml'
      - '.github/scripts/apply_migrations.py'
  schedule:
    # Daily 06:00 UTC — catches silent failures of the apply workflow
    # (e.g. missing/rotated SUPABASE_ACCESS_TOKEN, see SCH-834).
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify repo is not ahead of supabase_migrations.schema_migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: python3 .github/scripts/apply_migrations.py --dry-run
